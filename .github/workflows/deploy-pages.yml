name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - deployment-status.json
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        env:
          NEXT_PUBLIC_SITE_URL: https://satitech-official.github.io/venus-event-decor-premium-website
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: build.log
          if-no-files-found: ignore

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Record deployment status
        if: always()
        uses: actions/github-script@v7
        env:
          DEPLOY_STATUS: ${{ job.status }}
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          HEAD_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const path = "deployment-status.json";
            let sha;
            try {
              const current = await github.rest.repos.getContent({ owner, repo, path, ref: "main" });
              if (!Array.isArray(current.data)) sha = current.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }
            const report = {
              status: process.env.DEPLOY_STATUS,
              pageUrl: process.env.PAGE_URL || "https://satitech-official.github.io/venus-event-decor-premium-website/",
              commit: process.env.HEAD_SHA,
              runId: process.env.RUN_ID,
              verifiedAt: new Date().toISOString()
            };
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              branch: "main",
              message: "Record GitHub Pages deployment status [skip ci]",
              content: Buffer.from(`${JSON.stringify(report, null, 2)}\n`).toString("base64"),
              ...(sha ? { sha } : {})
            });
